name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint
    strategy:
      fail-fast: false
      matrix:
        runner: [incus, tart-linux-arm, macos-tart]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Nix
        uses: metacraft-labs/nixos-modules/.github/setup-nix@main
        with:
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          nix-github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix develop --command just lint
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-logs-${{ matrix.runner }}
          path: test-logs/
          retention-days: 30

  test:
    name: Test (orc/release/threads:on)
    strategy:
      fail-fast: false
      matrix:
        runner: [incus, tart-linux-arm, macos-tart]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Nix
        uses: metacraft-labs/nixos-modules/.github/setup-nix@main
        with:
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          nix-github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix develop --command just test
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.runner }}
          path: test-logs/
          retention-days: 30

  playwright-e2e:
    name: Playwright e2e (browser drives xterm.js against bridge)
    strategy:
      fail-fast: false
      matrix:
        runner: [incus, tart-linux-arm, macos-tart]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Nix
        uses: metacraft-labs/nixos-modules/.github/setup-nix@main
        with:
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          nix-github-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # Build the bridge + echo_packet_app fixture binaries that the
      # Playwright spec spawns as a real subprocess.
      - run: nix develop --command just build
      - name: Install Playwright deps
        working-directory: tests/e2e
        run: |
          npm install --no-audit --no-fund
          npx playwright install --with-deps chromium
      - name: Run Playwright e2e suite
        working-directory: tests/e2e
        run: npx playwright test
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.runner }}
          path: tests/e2e/playwright-report/
          retention-days: 30
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-${{ matrix.runner }}
          path: tests/e2e/test-results/
          retention-days: 30

  charter-matrix:
    name: Charter (${{ matrix.mm }}/${{ matrix.mode }}/threads:${{ matrix.threads }})
    strategy:
      fail-fast: false
      matrix:
        mm: [arc, orc, refc]
        mode: [debug, release]
        threads: [on, off]
        runner: [incus, tart-linux-arm, macos-tart]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Nix
        uses: metacraft-labs/nixos-modules/.github/setup-nix@main
        with:
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          nix-github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix develop --command just _matrix ${{ matrix.mm }} ${{ matrix.mode }} ${{ matrix.threads }}
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: charter-${{ matrix.mm }}-${{ matrix.mode }}-${{ matrix.threads }}-${{ matrix.runner }}
          path: test-logs/
          retention-days: 30
