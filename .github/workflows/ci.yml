name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - run: nix develop --command just lint
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-logs
          path: test-logs/
          retention-days: 30

  test:
    name: Test (orc/release/threads:on)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - run: nix develop --command just test
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: test-logs/
          retention-days: 30

  charter-matrix:
    name: Charter (${{ matrix.mm }}/${{ matrix.mode }}/threads:${{ matrix.threads }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mm: [arc, orc, refc]
        mode: [debug, release]
        threads: [on, off]
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - run: nix develop --command just _matrix ${{ matrix.mm }} ${{ matrix.mode }} ${{ matrix.threads }}
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: charter-${{ matrix.mm }}-${{ matrix.mode }}-${{ matrix.threads }}
          path: test-logs/
          retention-days: 30
